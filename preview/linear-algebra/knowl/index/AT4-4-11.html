<article class="fact theorem-like"><h4 class="heading">
<span class="type">Fact</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">3.4.14</span><span class="period heading-divison-mark heading-divison-mark__period">.</span>
</h4>
<div class="para">A linear transformation <span class="process-math">\(T:V \rightarrow W\)</span> is surjective <em class="emphasis">if and only if</em> <span class="process-math">\(\Im T = W\text{.}\)</span> Put another way, a surjective linear transformation may be recognized by its identical codomain and image.<div class="autopermalink" data-description="Paragraph"><a href="#AT4-4-11-1-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div> <figure class="figure figure-like"><div class="image-box" style="width: 75%; margin-left: 12.5%; margin-right: 12.5%;">
<img src="generated/latex-image/AT4-codomain-range-image.svg" role="img" class="contained" alt="described in detail following the image" aria-describedby="AT4-codomain-range-image-description"><details class="image-description" aria-live="polite"><summary title="details"><span class="icon material-symbols-outlined" aria-hidden="true">&#xe88e;</span></summary><div id="AT4-codomain-range-image-description">
<div class="para" id="AT4-codomain-range-image-2-1">Two examples are shown.  The one on the left illustrates a transformation from <span class="process-math">\(\IR^3\)</span> to <span class="process-math">\(\IR^2\)</span> with the <span class="process-math">\(xyz\)</span> coordinate axes (with several arbitrary vectors illustrated) connected by a curved dashed arrow to the right to an image of the <span class="process-math">\(xy\)</span>-plane.  The images of the individual arbitrary vectors are shown, and the entire <span class="process-math">\(xy\)</span> plane is shaded, representing that they span the entire space <span class="process-math">\(\IR^2\text{.}\)</span>  This example is labeled below as “surjective, <span class="process-math">\(\Im T = \IR^2\text{.}\)</span>”<div class="autopermalink" data-description="Paragraph"><a href="#AT4-codomain-range-image-2-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div> <div class="para" id="AT4-codomain-range-image-2-2">The example on the right illustrates a transformation from <span class="process-math">\(\IR^2\)</span>to <span class="process-math">\(\IR^3\)</span> with the <span class="process-math">\(xy\)</span> coordinate axes (with several arbitrary vectors illustrated) connected by a curved dashed arrow to the right to an image of the <span class="process-math">\(xyz\)</span> coordinate axes.  The images of the individual arbitrary vectors are shown, all lying in a two dimensional plane which is shaded.  This example is labeled below as “not surjective, <span class="process-math">\(\Im T \neq \IR^3\text{.}\)</span>”<div class="autopermalink" data-description="Paragraph"><a href="#AT4-codomain-range-image-2-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</div></details>
</div>
<figcaption><span class="type">Figure</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">3.4.15<span class="period heading-divison-mark heading-divison-mark__period">.</span></span><span class="space heading-divison-mark heading-divison-mark__space"> </span>A linear transformation with identical codomain and image, which is therefore surjective; and a linear transformation with an image smaller than the codomain <span class="process-math">\(\IR^3\text{,}\)</span> which is therefore not surjective.<div class="autopermalink" data-description="Figure 3.4.15"><a href="#AT4-4-11-1-2" title="Copy heading and permalink for Figure 3.4.15" aria-label="Copy heading and permalink for Figure 3.4.15">🔗</a></div></figcaption></figure><div class="autopermalink" data-description="Fact 3.4.14"><a href="#AT4-4-11" title="Copy heading and permalink for Fact 3.4.14" aria-label="Copy heading and permalink for Fact 3.4.14">🔗</a></div></article><span class="incontext"><a class="internal" href="AT4.html#AT4-4-11">in-context</a></span>
